<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found – HawkTec</title>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#0b0e14;color:#c9d1de;min-height:100vh;display:flex;align-items:center;justify-content:center}
    body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:9999}
    .box{text-align:center;padding:40px 24px;max-width:420px}
    .code{font-family:'Silkscreen',monospace;font-size:4rem;color:#3dd8c5;margin-bottom:12px}
    h1{font-size:1.2rem;font-weight:600;color:#eaf0f9;margin-bottom:8px}
    p{color:#6b7a94;font-size:0.9rem;margin-bottom:24px}
    a{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:rgba(61,216,197,0.12);border:1px solid rgba(61,216,197,0.18);border-radius:4px;color:#3dd8c5;text-decoration:none;font-family:'Space Mono',monospace;font-size:0.75rem;transition:all 0.15s}
    a:hover{background:rgba(61,216,197,0.18);border-color:#3dd8c5}
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">← Back to Home</a>
  </div>
</body>
</html>
